<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantis HQ | Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.webp">
</head>
<body id="standard-calculator">
  <header>
    <a href="index.html" class="site-title">
      <img src="logo.webp" alt="Website Logo" class="header-logo">
    </a>
    <nav class="header-nav">
      <a href="calculatorstartpage.html" class="calculators-back-button">Back</a>
    </nav>
  </header>
  <main>
    <section class="welcome">
      <h2 class="mainbodyheader">Scientific Calculator</h2>
    </section>
    <section class="standard-calculator-section">
      <div class="standard-calc-calculator">
        <input type="text" id="standard-calc-display" readonly>
        <div class="standard-calculator-buttons">
          <button onclick="clearDisplay()">C</button>
          <button onclick="appendToDisplay('(')">(</button>
          <button onclick="appendToDisplay(')')">)</button>
          <button onclick="appendToDisplay('÷')">÷</button>
          <button onclick="appendToDisplay('7')">7</button>
          <button onclick="appendToDisplay('8')">8</button>
          <button onclick="appendToDisplay('9')">9</button>
          <button onclick="appendToDisplay('×')">×</button>
          <button onclick="appendToDisplay('4')">4</button>
          <button onclick="appendToDisplay('5')">5</button>
          <button onclick="appendToDisplay('6')">6</button>
          <button onclick="appendToDisplay('-')">-</button>
          <button onclick="appendToDisplay('1')">1</button>
          <button onclick="appendToDisplay('2')">2</button>
          <button onclick="appendToDisplay('3')">3</button>
          <button onclick="appendToDisplay('+')">+</button>
          <button onclick="appendToDisplay('0')">0</button>
          <button onclick="appendToDisplay('.')">.</button>
          <button onclick="calculate()">=</button>
          <button onclick="appendToDisplay('sqrt(')">√</button>
          <button onclick="appendToDisplay('pow(')">x^y</button>
          <button onclick="appendToDisplay('sin(')">sin</button>
          <button onclick="appendToDisplay('cos(')">cos</button>
          <button onclick="appendToDisplay('tan(')">tan</button>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <a href="contact.html" class="footer-contact">Contact Us</a>
    <p class="footer-copyright">© 2025 Mantis HQ. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
