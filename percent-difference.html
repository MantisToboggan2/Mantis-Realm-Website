<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantis HQ | Percent Difference</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.webp">
</head>
<body id="percent-difference">
  <header>
    <a href="index.html" class="site-title">
      <img src="logo.webp" alt="Website Logo" class="header-logo">
    </a>
    <nav class="header-nav">
      <a href="calculatorstartpage.html" class="calculators-back-button">Back</a>
    </nav>
  </header>
  <main>
    <section class="welcome">
      <h2 class="mainbodyheader">Percent Difference Calculator</h2>
    </section>
    <section class="description">
      <p class="mainbodyheader2">The percent difference calculator is used to compare two numbers and express the difference between them as a percentage of the average of those two numbers.</p>
    </section>
    <section class="calculator-section">
      <div class="pdif-calculator">
        <div class="input-group">
          <label for="value1">Value 1:</label>
          <input type="number" id="value1" placeholder="Enter first value" step="any" required>
        </div>
        <div class="input-group">
          <label for="value2">Value 2:</label>
          <input type="number" id="value2" placeholder="Enter second value" step="any" required>
        </div>
        <button onclick="calculatePercentDifference()">Calculate</button>
        <div class="pdif-result" id="result"></div>
      </div>
    </section>
  </main>
  <footer>
    <a href="contact.html" class="footer-contact">Contact Us</a>
    <p class="footer-copyright">© 2025 Mantis HQ. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
