<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="/images/logo.webp">
</head>
<body id="percent-difference">
<header id="main-header"> 
    <div class="header-container">
        <a href="index.html">
            <img src="/images/logo.webp" alt="Mantis HQ Logo" class="header-logo">
        </a>
        <nav class="desktop-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="calculatorstartpage.html">Calcs</a></li>
                <li><a href="youtube.html">Youtube</a></li>
                <li><a href="dectalk.html">DECtalk</a></li>
            </ul>
        </nav>
        <a href="websites.html" class="websites-btn">
            <span class="websites-text">Web Design</span>
        </a>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="mobile-nav" id="mobile-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="calculatorstartpage.html">Calcs</a></li>
                <li><a href="youtube.html">Youtube</a></li>
                <li><a href="dectalk.html">DECtalk</a></li>
            </ul>
        </nav>
    </div>
</header>
<main class="container home-page">
    <section class="mainbox">
        <div class="mainbox-content">
            <h1 class="mainbox-title" data-text="Percent Difference">Percent Difference</h1>
            <p class="mainbox-paragraph">Compares two values relative to their average. Ideal for identifying the variance between two independent data points.</p>
            <div class="website-status-terminal">
                <div class="contact-form">
                    <div class="input-group">
                        <label for="value1">V1</label>
                        <input type="number" id="value1" step="any" placeholder="Input first value...">
                    </div>
                    <div class="input-group">
                        <label for="value2">V2</label>
                        <input type="number" id="value2" step="any" placeholder="Input second value...">
                    </div>
                    <div class="mainbox-actions">
                        <button onclick="calculatePercentDifference()" class="cyber-btn btn-blue">CALCULATE</button>
                    </div>
                    <div id="result" style="margin-top: 30px; font-family: 'Orbitron', sans-serif; text-align: center;">
                        <div style="border: 1px solid rgba(0, 209, 255, 0.2); padding: 20px; background: rgba(0, 0, 0, 0.4); border-radius: 4px;">
                            <h2 id="diff-display" style="font-size: 32px; color: rgb(0, 209, 255); margin-top: 10px; text-shadow: 0 0 10px rgba(0, 209, 255, 0.5);">--%</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<footer>
    <a href="https://cloudflare.com/" class="footer-contact" target="_blank">
        <img src="/images/cf.webp" alt="Cloudflare logo" class="footer-logo">

</footer>
<script src="main.js"></script>
</body>
