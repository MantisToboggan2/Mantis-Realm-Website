<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantis HQ | Contact</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.webp">
</head>
<body id="contact">
  <header>
    <a href="index.html" class="site-title">
      <img src="logo.webp" alt="Website Logo" class="header-logo">
    </a>
    <nav class="header-nav">
      <a href="javascript:history.back()" class="calculators-back-button">Back</a>
    </nav>
  </header>
  <main>
    <section class="welcome">
      <h2 class="mainbodyheader">Welcome to the Contact page! Please enter your email and provide any feedback you have here!</h2>
    </section>
    <section class="contact-form">
      <form action="https://formspree.io/f/mqazrgpj" method="POST">
        <label>
          Your email:
          <input type="email" name="email" required>
        </label>
        <label>
          Your message:
          <textarea name="message" required></textarea>
        </label>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>
  <footer>
    <a href="contact.html" class="footer-contact">Contact Us</a>
    <p class="footer-copyright">© 2025 Mantis HQ. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
